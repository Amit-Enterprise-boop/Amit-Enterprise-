<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amit Enterprise</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  text-align:center;
  padding:15px;
  font-size:18px;
  position:sticky;
  top:0;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* PRODUCT CARD */
.product{
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

/* IMAGE FIX */
.product img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:8px;
  margin-top:8px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* TAB */
.tab{
  display:flex;
  background:white;
}

.tab button{
  flex:1;
  padding:12px;
  border:none;
  font-weight:bold;
  background:#eee;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🛍️ Amit Enterprise Store</header>

<div class="tab">
  <button onclick="show('imitation')">💎 Imitation</button>
  <button onclick="show('other')">🛍️ Other</button>
</div>

<!-- IMITATION -->
<div id="imitation" class="container">

  <div class="product">
    <img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
    <h3>Necklace Set</h3>
    <p>₹299</p>
    <a class="btn" href="https://wa.me/919725228084?text=I want Necklace Set">Order on WhatsApp</a>
  </div>

  <div class="product">
    <img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
    <h3>Earrings</h3>
    <p>₹149</p>
    <a class="btn" href="https://wa.me/919725228084?text=I want Earrings">Order on WhatsApp</a>
  </div>

</div>

<!-- OTHER -->
<div id="other" class="container" style="display:none;">

  <div class="product">
    <img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
    <h3>Kitchen Tool</h3>
    <p>₹199</p>
    <a class="btn" href="https://wa.me/919725228084?text=I want Kitchen Tool">Order on WhatsApp</a>
  </div>

</div>

<script>
function show(tab){
  document.getElementById('imitation').style.display='none';
  document.getElementById('other').style.display='none';
  document.getElementById(tab).style.display='grid';
}
</script>

</body>
</html>
