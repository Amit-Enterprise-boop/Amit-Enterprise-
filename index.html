<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amit Enterprise</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.tab {
  display: flex;
}

.tab button {
  flex: 1;
  padding: 15px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.tabcontent {
  display: none;
  padding: 10px;
}

.product {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  display: block;
  text-align: center;
  background: green;
  color: white;
  padding: 10px;
  margin-top: 10px;
  text-decoration: none;
  border-radius: 8px;
}

.category {
  background: #ddd;
  padding: 10px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>Amit Enterprise</header>

<div class="tab">
  <button onclick="openTab('imitation')">💎 Imitation</button>
  <button onclick="openTab('other')">🛍️ Other Products</button>
</div>

<!-- IMITATION -->
<div id="imitation" class="tabcontent" style="display:block;">

<div class="category">Necklace Sets</div>

<div class="product">
  <img src="https://i.ibb.co/zHfpNHXD/Whats-App-Image-2026-03-01-at-4-16-44-PM.jpg">
  <h3>Necklace Set</h3>
  <p>Price: ₹199</p>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I want Necklace Set">Order on WhatsApp</a>
</div>

<div class="category">Earrings</div>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Earrings</h3>
  <p>Price: ₹149</p>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I want Earrings">Order on WhatsApp</a>
</div>

<!-- Bulk -->
<div class="product">
  <h3>🔥 Wholesale / Bulk Order</h3>
  <a class="btn" style="background: darkred;"
  href="https://wa.me/91XXXXXXXXXX?text=I want wholesale price for imitation jewellery">
  Bulk Inquiry
  </a>
</div>

</div>

<!-- OTHER PRODUCTS -->
<div id="other" class="tabcontent">

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Kitchen Tool</h3>
  <p>Price: ₹199</p>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I want Kitchen Tool">Order on WhatsApp</a>
</div>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h3>Rain Item</h3>
  <p>Price: ₹99</p>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I want Rain Item">Order on WhatsApp</a>
</div>

<!-- Bulk -->
<div class="product">
  <h3>🔥 Wholesale Inquiry</h3>
  <a class="btn" style="background: darkred;"
  href="https://wa.me/91XXXXXXXXXX?text=I want bulk order for other products">
  Bulk Order WhatsApp
  </a>
</div>

</div>

<script>
function openTab(tabName) {
  document.getElementById('imitation').style.display = 'none';
  document.getElementById('other').style.display = 'none';
  document.getElementById(tabName).style.display = 'block';
}
</script>

</body>
</html>
