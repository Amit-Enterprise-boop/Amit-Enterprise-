<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amit Enterprise</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  position:sticky;
  top:0;
}

/* SEARCH */
.search{
  padding:10px;
  background:white;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* TABS */
.tab{
  display:flex;
  background:white;
}

.tab button{
  flex:1;
  padding:12px;
  border:none;
  background:#eee;
  font-weight:bold;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* PRODUCT CARD */
.product{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  height:160px;
  object-fit:contain;
  background:white;
  border-radius:8px;
}

.btn{
  display:block;
  text-align:center;
  background:#ff9f00;
  color:white;
  padding:8px;
  margin-top:8px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* WHATSAPP FLOAT */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>🛍️ Amit Enterprise Store</header>

<div class="search">
<input type="text" placeholder="Search products...">
</div>

<div class="tab">
<button onclick="openTab('imitation')">💎 Imitation</button>
<button onclick="openTab('other')">🛍️ Other</button>
</div>

<!-- IMITATION -->
<div id="imitation" class="tabcontent" style="display:block;">
<div class="container">

<div class="product">
<img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
<h3>Necklace Set</h3>
<p>₹299</p>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy Now</a>
</div>

<div class="product">
<img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
<h3>Earrings</h3>
<p>₹149</p>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy Now</a>
</div>

</div>
</div>

<!-- OTHER -->
<div id="other" class="tabcontent" style="display:none;">
<div class="container">

<div class="product">
<img src="https://i.ibb.co/d4L4bsxs/Whats-App-Image.jpg">
<h3>Kitchen Tool</h3>
<p>₹199</p>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Buy Now</a>
</div>

</div>
</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>
function openTab(tab){
  document.getElementById('imitation').style.display='none';
  document.getElementById('other').style.display='none';
  document.getElementById(tab).style.display='block';
}
</script>

</body>
</html>
